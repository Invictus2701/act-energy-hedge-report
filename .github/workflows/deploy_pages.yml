name: Deploy Cockpit to GitHub Pages

# ─────────────────────────────────────────────────────────────
#  QUAND ?
#  - A chaque push sur master
#  - A la fin du refresh quotidien (daily_update.yml) via
#    workflow_run, pour republier les JSON frais
#  - Manuellement (Run workflow) depuis l'onglet Actions
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches: [master]
  workflow_run:
    workflows: ["Daily Luminus Market Sync"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Vite
        env:
          # Chemin sous lequel le site est servi sur GitHub Pages
          BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
