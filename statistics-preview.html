<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Cockpit — Statistics</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --night:#262E4B; --teal:#86B9B7; --gold:#D3A021; --green:#A4D65E;
    --paper:#faf7f0; --paper2:#f2ede0;
  }
  body { background:#efe9db; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  .var-col { background: var(--green); color: white; font-weight: 600; }
  .grp { background: var(--night); color: white; }
  .head { background: var(--night); color: white; }
  td, th { padding: 0.55rem 0.75rem; }
  tbody tr.zebra { background: var(--paper2); }
  tbody tr.zebra2 { background: var(--paper); }
</style>
</head>
<body class="p-8">
<div class="max-w-6xl mx-auto bg-[color:var(--paper)] p-6 rounded-xl shadow">

  <div class="flex items-center justify-center gap-3 mb-4">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#86B9B7" stroke-width="2">
      <rect x="3" y="12" width="4" height="9"/><rect x="10" y="6" width="4" height="15"/><rect x="17" y="9" width="4" height="12"/>
    </svg>
    <h2 class="text-2xl font-semibold tracking-widest text-[color:var(--night)]">STATISTICS</h2>
  </div>

  <div class="overflow-x-auto rounded-md border border-black/10">
  <table id="t" class="w-full text-sm border-collapse"></table>
  </div>
</div>

<!-- Chargement via script tag : fonctionne même en file:// -->
<script src="statistics-data.js"></script>
<script>
// Données chargées depuis statistics-data.json (généré par la pipeline Python).
// Aucune donnée codée en dur ici — plus de mock.
const fmt  = v => v==null?"—":Number(v).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtP = v => v==null?"—":(v>0?"+":"")+Number(v).toFixed(2)+"%";

const BOLT  = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:-3px"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>';
const FLAME = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:-3px"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>';

const t = document.getElementById("t");

async function render() {
  let data;

  // 1) Priorité : données injectées via <script src="statistics-data.js">
  //    (fonctionne même en file://, pas de problème CORS)
  if (window.__STATISTICS_DATA__) {
    data = window.__STATISTICS_DATA__;
  } else {
    // 2) Fallback : fetch (fonctionne uniquement via http://)
    try {
      const res = await fetch("statistics-data.json", {cache:"no-cache"});
      if (!res.ok) throw new Error("HTTP " + res.status);
      data = await res.json();
    } catch (e) {
      t.innerHTML = `<tbody><tr><td style="padding:2rem;color:#b22">
        Impossible de charger les données.<br/>
        Vérifier que <code>statistics-data.js</code> existe (généré par la pipeline Python)
        ou servir la page via HTTP.<br/><small>${e.message}</small></td></tr></tbody>`;
      return;
    }
  }

  const s = data.meta.sessions;
  const cols = 1 + s.length + 5;

  let html = `<thead>
  <tr class="head">
    <th class="text-left">Markets</th>
    ${s.map(x=>`<th class="text-center"><div class="text-xs opacity-80">${x.label}</div><div>${x.weekday}</div></th>`).join("")}
    <th class="var-col text-center">Var D-1</th>
    <th class="var-col text-center">Var W-1</th>
    <th class="text-center">Avg.</th>
    <th class="text-center">Max</th>
    <th class="text-center">Min</th>
  </tr>
  <tr><td colspan="${cols}" class="text-right text-xs italic text-[color:var(--night)]/70">* MAX, MIN, AVG - Since the beginning of the year</td></tr>
</thead><tbody>`;

for (const g of data.markets) {
  const icon = g.group==="ELECTRICITY" ? BOLT : FLAME;
  html += `<tr class="grp"><td colspan="${cols}" class="font-semibold uppercase tracking-wide">${icon} &nbsp;${g.group}</td></tr>`;
  g.products.forEach((p,i)=>{
    html += `<tr class="${i%2?'zebra':'zebra2'}">
      <td class="font-medium text-[color:var(--night)]">${p.label} <span class="text-xs opacity-60">(EUR/MWh)</span></td>
      ${p.prices.map(v=>`<td class="text-center">${fmt(v)}</td>`).join("")}
      <td class="var-col text-center">${fmtP(p.varD1)}</td>
      <td class="var-col text-center">${fmtP(p.varW1)}</td>
      <td class="text-center">${fmt(p.avg)}</td>
      <td class="text-center">${fmt(p.max)}</td>
      <td class="text-center">${fmt(p.min)}</td>
    </tr>`;
  });
}
  html += "</tbody>";
  t.innerHTML = html;
}
render();
</script>
</body>
</html>
